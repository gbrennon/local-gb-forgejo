services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:11
    container_name: forgejo
    restart: unless-stopped
    ports:
      - "1234:3000"
    volumes:
      - forgejo_data:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=forgejo-db:5432
      - FORGEJO__database__NAME=${POSTGRES_DB:-forgejo}
      - FORGEJO__database__USER=${POSTGRES_USER:-forgejo}
      - FORGEJO__database__PASSWD=${POSTGRES_PASSWORD}
      - FORGEJO__actions__ENABLED=true
      - FORGEJO__actions__RUNNER_MODE=docker
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__server__ROOT_URL=http://forgejo.local/
      - FORGEJO__server__DOMAIN=localhost
    depends_on:
      forgejo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  forgejo-db:
    image: postgres:16-alpine
    container_name: forgejo-db
    restart: unless-stopped
    volumes:
      - forgejo_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-forgejo}
      - POSTGRES_USER=${POSTGRES_USER:-forgejo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forgejo} -d ${POSTGRES_DB:-forgejo}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  forgejo-runner:
    image: data.forgejo.org/forgejo/runner:9
    container_name: forgejo-runner
    restart: unless-stopped
    user: 0:0
    working_dir: /data
    command: ["/bin/forgejo-runner", "daemon", "--config", "/data/config.yml"]
    volumes:
      - forgejo_runner_data:/data
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/var/run/docker.sock:z
    security_opt:
      - label=disable
    depends_on:
      forgejo:
        condition: service_healthy

volumes:
  forgejo_data:
  forgejo_db_data:
  forgejo_runner_data:
