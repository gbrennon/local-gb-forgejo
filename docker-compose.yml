services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    restart: unless-stopped
    ports:
      - "1234:3000"
    volumes:
      - forgejo_data:/data
      - /etc/localtime:/etc/localtime:ro
      - ./certs:/certs:Z,ro
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=forgejo-db:5432
      - FORGEJO__database__NAME=${POSTGRES_DB:-forgejo}
      - FORGEJO__database__USER=${POSTGRES_USER:-forgejo}
      - FORGEJO__database__PASSWD=${POSTGRES_PASSWORD}
      - FORGEJO__actions__ENABLED=true
      - FORGEJO__actions__RUNNER_MODE=docker
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__server__ROOT_URL=https://forgejo.local/
      - FORGEJO__server__DOMAIN=forgejo.local
      - FORGEJO__server__PROTOCOL=https
      - FORGEJO__server__CERT_FILE=/certs/server-cert.pem
      - FORGEJO__server__KEY_FILE=/certs/server-key.pem
      - FORGEJO__server__SSH_PORT=2222
      - FORGEJO__server__SSH_LISTEN_PORT=22
      - FORGEJO__repository__ALLOW_SELF_REVIEWS=true
    depends_on:
      forgejo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  forgejo-db:
    image: postgres:16-alpine
    container_name: forgejo-db
    restart: unless-stopped
    volumes:
      - forgejo_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-forgejo}
      - POSTGRES_USER=${POSTGRES_USER:-forgejo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forgejo} -d ${POSTGRES_DB:-forgejo}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  forgejo-runner:
    image: code.forgejo.org/forgejo/runner:9
    container_name: forgejo-runner
    restart: unless-stopped
    user: "0:0"
    working_dir: /data
    command: ["/bin/forgejo-runner", "daemon", "--config", "/data/config.yml"]
    environment:
      - GITEA_INSTANCE_URL=https://forgejo:3000
      - GITEA_INSECURE=true
      - GITEA_RUNNER_REGISTRATION_TOKEN_FILE=/run/secrets/runner_token
      - GITEA_RUNNER_NAME=local-runner
      - GITEA_RUNNER_LABELS=ubuntu-latest:docker://node:20-bookworm,ubuntu-22.04:docker://node:20-bookworm,debian-latest:docker://debian:bookworm
    volumes:
      - forgejo_runner_data:/data
      - ./runner-data/config.yml:/data/config.yml:ro,z
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/var/run/docker.sock:z
    security_opt:
      - label=disable
    priviled: true
    depends_on:
      forgejo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    secrets:
      - runner_token

  runner-tiny:
    image: code.forgejo.org/forgejo/runner:9
    container_name: forgejo-runner-tiny
    restart: unless-stopped
    user: "0:0"
    working_dir: /data
    command: ["/bin/forgejo-runner", "daemon", "--config", "/data/config.yml"]
    environment:
      - GITEA_INSTANCE_URL=https://forgejo:3000
      - GITEA_INSECURE=true
      - GITEA_RUNNER_REGISTRATION_TOKEN=${RUNNER_TOKEN_TINY}
      - GITEA_RUNNER_NAME=runner-tiny
      - GITEA_RUNNER_LABELS=codeberg-tiny:docker://node:20-bookworm
    volumes:
      - forgejo_runner_tiny:/data
      - ./runner-data/config.yml:/data/config.yml:ro,z
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/var/run/docker.sock:z
    security_opt:
      - label=disable
    depends_on:
      forgejo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  runner-small:
    image: code.forgejo.org/forgejo/runner:9
    container_name: forgejo-runner-small
    restart: unless-stopped
    user: "0:0"
    working_dir: /data
    command: ["/bin/forgejo-runner", "daemon", "--config", "/data/config.yml"]
    environment:
      - GITEA_INSTANCE_URL=https://forgejo:3000
      - GITEA_INSECURE=true
      - GITEA_RUNNER_REGISTRATION_TOKEN=${RUNNER_TOKEN_SMALL}
      - GITEA_RUNNER_NAME=runner-small
      - GITEA_RUNNER_LABELS=codeberg-small:docker://node:20-bookworm
    volumes:
      - forgejo_runner_small:/data
      - ./runner-data/config.yml:/data/config.yml:ro,z
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/var/run/docker.sock:z
    security_opt:
      - label=disable
    depends_on:
      forgejo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  runner-medium:
    image: code.forgejo.org/forgejo/runner:9
    container_name: forgejo-runner-medium
    restart: unless-stopped
    user: "0:0"
    working_dir: /data
    command: ["/bin/forgejo-runner", "daemon", "--config", "/data/config.yml"]
    environment:
      - GITEA_INSTANCE_URL=https://forgejo:3000
      - GITEA_INSECURE=true
      - GITEA_RUNNER_REGISTRATION_TOKEN=${RUNNER_TOKEN_MEDIUM}
      - GITEA_RUNNER_NAME=runner-medium
      - GITEA_RUNNER_LABELS=codeberg-medium:docker://node:20-bookworm
    volumes:
      - forgejo_runner_medium:/data
      - ./runner-data/config.yml:/data/config.yml:ro,z
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/var/run/docker.sock:z
    security_opt:
      - label=disable
    depends_on:
      forgejo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

volumes:
  forgejo_data:
  forgejo_db_data:
  forgejo_runner_data:
  forgejo_runner_tiny:
  forgejo_runner_small:
  forgejo_runner_medium:

secrets:
  runner_token:
    file: ./forgejo_secret.txt
